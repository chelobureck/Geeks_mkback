version: '3.8'

services:
  web:
    build: .
    command: ./run.sh
    volumes:
      - .:/app
      - static_volume:/app/static
      - media_volume:/app/media
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: always
    environment:
      - PYTHONUNBUFFERED=1

volumes:
  static_volume:
  media_volume:
